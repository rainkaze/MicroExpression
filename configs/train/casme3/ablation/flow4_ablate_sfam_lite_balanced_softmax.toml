[data]
manifest_path = "data/processed/casme3_recognition_v2/casme3_recognition_manifest.csv"
input_mode = "flow"
label_mode = "4class"
clean_only = true

[model]
name = "motion_sfam_lite"
base_channels = 8
dropout = 0.45

[train]
epochs = 80
batch_size = 64
lr = 0.0002
weight_decay = 0.004
num_workers = 0
seed = 42
fold = 0
run_all_folds = false
device = "cuda"
loss_name = "balanced_softmax"
label_smoothing = 0.03
focal_gamma = 2.0
early_stop_patience = 12
balanced_sampler = false
sampler_power = 0.0

[output]
root_dir = "artifacts/runs_dev2"
run_name = "flow4_ablate_sfam_lite_balanced_softmax"
