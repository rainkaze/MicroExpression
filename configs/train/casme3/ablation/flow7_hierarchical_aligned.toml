[data]
manifest_path = "data/processed/casme3_recognition_v2/casme3_recognition_manifest.csv"
input_mode = "flow"
clean_only = true

[split]
seed = 42
fold = 0
label_mode = "7class"

[coarse_model]
name = "motion_multibranch_v2"
base_channels = 24
dropout = 0.45

[coarse_train]
epochs = 80
batch_size = 48
lr = 0.0001
weight_decay = 0.004
num_workers = 0
device = "cuda"
loss_name = "balanced_softmax"
label_smoothing = 0.03
focal_gamma = 2.0
early_stop_patience = 12

[negative_model]
name = "motion_multibranch_v2"
base_channels = 32
dropout = 0.40

[negative_train]
epochs = 80
batch_size = 32
lr = 0.00015
weight_decay = 0.003
num_workers = 0
device = "cuda"
loss_name = "balanced_softmax"
label_smoothing = 0.04
focal_gamma = 2.0
early_stop_patience = 12

[output]
root_dir = "artifacts/runs_dev2"
run_name = "flow7_hierarchical_aligned"
