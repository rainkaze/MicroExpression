[data]
manifest_path = "data/processed/casme3_recognition_v2/casme3_recognition_manifest.csv"
input_mode = "flow"
label_mode = "negative4"
clean_only = true

[model]
name = "motion_multibranch_v2"
base_channels = 32
dropout = 0.40

[train]
epochs = 80
batch_size = 32
lr = 0.00015
weight_decay = 0.003
num_workers = 0
seed = 42
fold = 0
run_all_folds = false
device = "cuda"
loss_name = "balanced_softmax"
label_smoothing = 0.04
focal_gamma = 2.0
early_stop_patience = 12
balanced_sampler = false
sampler_power = 0.0

[output]
root_dir = "artifacts/runs_dev2"
run_name = "flow7_negative_subclass_balanced_softmax"
