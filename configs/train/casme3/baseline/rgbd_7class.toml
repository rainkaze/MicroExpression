[data]
manifest_path = "data/processed/casme3_recognition_v2/casme3_recognition_manifest.csv"
input_mode = "rgbd_flow"
label_mode = "7class"
clean_only = true

[model]
name = "rgbd_fusion"
base_channels = 32
dropout = 0.25

[train]
epochs = 40
batch_size = 32
lr = 0.0003
weight_decay = 0.001
num_workers = 0
seed = 42
fold = 0
run_all_folds = false
device = "cuda"
loss_name = "weighted_ce"
label_smoothing = 0.03
focal_gamma = 2.0
early_stop_patience = 8

[output]
root_dir = "artifacts/runs_dev2"
run_name = "rgbd_fusion_7class"
